<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Bakery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🍰 Smart Bakery</h1>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html" class="btn-primary">Register</a></li>
      </ul>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-form">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
      <div id="message" class="message"></div>
      
      <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
      
      <div class="test-accounts">
        <h4>Test Accounts:</h4>
        <p><strong>Admin:</strong> admin@bakery.com / password123</p>
        <p><strong>User:</strong> john@example.com / password123</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Store token and user info
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          messageDiv.textContent = 'Login successful! Redirecting...';
          messageDiv.className = 'message success';

          // Redirect based on role
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = 'admin-dashboard.html';
            } else {
              window.location.href = 'dashboard.html';
            }
          }, 1500);
        } else {
          messageDiv.textContent = data.message || 'Login failed';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        messageDiv.textContent = 'Error: ' + error.message;
        messageDiv.className = 'message error';
      }
    });
  </script>
</body>
</html>
