<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Smart Bakery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🍰 Smart Bakery</h1>
      <ul class="nav-menu">
        <li><span id="userName">User</span></li>
        <li><a href="#" id="logoutBtn" class="btn-secondary">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <ul>
        <li><a href="#orders" class="active">📦 My Orders</a></li>
        <li><a href="#rewards">🎁 My Rewards</a></li>
        <li><a href="#place-order">➕ Place New Order</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <!-- Place Order Section -->
      <section id="place-order" class="section">
        <h2>Place a New Order</h2>
        <form id="orderForm" class="order-form">
          <div class="form-group">
            <label for="cake_name">Cake Name</label>
            <input type="text" id="cake_name" name="cake_name" placeholder="e.g., Chocolate Cake" required>
          </div>
          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" step="0.5" min="0.5" required>
          </div>
          <div class="form-group">
            <label for="message">Custom Message</label>
            <textarea id="message" name="message" placeholder="Add a special message"></textarea>
          </div>
          <div class="form-group">
            <label for="image">Upload Cake Design Image</label>
            <input type="file" id="image" name="image" accept="image/*">
          </div>
          <div class="form-group">
            <label for="pickup_time">Pickup Date & Time</label>
            <input type="datetime-local" id="pickup_time" name="pickup_time" required>
          </div>
          <button type="submit" class="btn-primary">Place Order</button>
          <div id="orderMessage" class="message"></div>
        </form>
      </section>

      <!-- My Orders Section -->
      <section id="orders" class="section">
        <h2>My Orders</h2>
        <div id="ordersList" class="orders-list">
          <p>Loading orders...</p>
        </div>
      </section>

      <!-- Rewards Section -->
      <section id="rewards" class="section">
        <h2>My Rewards</h2>
        <div id="rewardsInfo" class="rewards-card">
          <p>Loading rewards...</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    // Check if user is logged in
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('userName').textContent = user.name || 'User';
    }

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });

    // Place order
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();
      formData.append('cake_name', document.getElementById('cake_name').value);
      formData.append('weight', document.getElementById('weight').value);
      formData.append('message', document.getElementById('message').value);
      formData.append('pickup_time', document.getElementById('pickup_time').value);
      if (document.getElementById('image').files.length > 0) {
        formData.append('image', document.getElementById('image').files[0]);
      }

      const messageDiv = document.getElementById('orderMessage');

      try {
        const response = await fetch('http://localhost:3000/api/orders', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.textContent = `Order placed! You earned ${data.pointsAwarded} reward points!`;
          messageDiv.className = 'message success';
          document.getElementById('orderForm').reset();
          loadOrders();
          setTimeout(() => messageDiv.textContent = '', 3000);
        } else {
          messageDiv.textContent = data.message || 'Failed to place order';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        messageDiv.textContent = 'Error: ' + error.message;
        messageDiv.className = 'message error';
      }
    });

    // Load user orders
    async function loadOrders() {
      try {
        const response = await fetch('http://localhost:3000/api/orders', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const orders = await response.json();
        const ordersList = document.getElementById('ordersList');

        if (orders.length === 0) {
          ordersList.innerHTML = '<p>No orders yet. Place your first order!</p>';
          return;
        }

        ordersList.innerHTML = orders.map(order => `
          <div class="order-card">
            <h3>${order.cake_name}</h3>
            <p><strong>Weight:</strong> ${order.weight} kg</p>
            <p><strong>Message:</strong> ${order.message || 'No message'}</p>
            <p><strong>Status:</strong> <span class="status ${order.status.toLowerCase()}">${order.status}</span></p>
            <p><strong>Pickup:</strong> ${new Date(order.pickup_time).toLocaleString()}</p>
            <p><strong>Price:</strong> $${order.price}</p>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('ordersList').innerHTML = `<p class="error">Error loading orders: ${error.message}</p>`;
      }
    }

    // Load rewards
    async function loadRewards() {
      try {
        const response = await fetch('http://localhost:3000/api/dashboard/rewards', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const rewards = await response.json();
        document.getElementById('rewardsInfo').innerHTML = `
          <div class="rewards-display">
            <h3>Current Points: <span class="points">${rewards.points}</span></h3>
            <p>1 point = $1 reward value</p>
            <p>Earn points on every order!</p>
          </div>
        `;
      } catch (error) {
        document.getElementById('rewardsInfo').innerHTML = `<p class="error">Error loading rewards: ${error.message}</p>`;
      }
    }

    // Load data on page load
    loadOrders();
    loadRewards();

    // Scroll to section
    document.querySelectorAll('.sidebar a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.sidebar a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const sectionId = link.getAttribute('href');
        document.querySelector(sectionId).scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
